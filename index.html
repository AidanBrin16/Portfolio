<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aidan Brin Portfolio</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Home</a>
      <b class="navbar-brand" href="#">About Me</b>
      <c class="navbar-brand" href="#">Case Studies</c>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="display-4">Hello, my name is Aidan Brin.</h1>
    <p class="my-text">My Bootstrap 5 site is live.</p>
  </div>

  <script>
    fetch('Text/About Me.txt')
      .then(response => response.text())
      .then(text => {
        document.getElementById('my-text').innerText = text;
      })
      .catch(error => {
        document.getElementById('my-text').innerText = 'Failed to load content.';
        console.error('Error:', error);
      });
  </script>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
