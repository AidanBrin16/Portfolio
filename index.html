<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aidan Brin Portfolio</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Case studies 2x2 grid layout */
    #case-studies .case-study-card {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 100%;
      padding: 1rem;
      border: 1px solid #dee2e6;
      border-radius: 0.5rem;
    }
 
    #case-studies .case-study-card .case-study-img {
      flex: 0 0 45%;
      max-width: 45%;
    }
 
    #case-studies .case-study-card .case-study-img img {
      width: 100%;
      height: auto;
      border-radius: 0.375rem;
    }
 
    #case-studies .case-study-card .case-study-text {
      flex: 1;
    }
 
    #case-studies .case-study-card .case-study-text h4 {
      margin-bottom: 0.5rem;
    }
 
    #case-studies .case-study-card .case-study-text p {
      margin-bottom: 0;
    }
 
    #case-studies .row.g-4 {
      margin-top: 0.5rem;
    }
  </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">Home</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#about">About Me</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#work">How I Work</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#case-studies">Case Studies</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<div class="banner">
  <img src="Images/Banner.jpg" alt="Banner" />
  <div class="banner-text">
    <h1 class="display-4">Portfolio</h1>
  </div>
</div>



<section id="about">
  <div class="about-box">
    <div class="container">
      <div class="row align-items-center">

        <div class="col-md-6">
          <img src="Images/Me.jpg" alt="Me playing hockey" class="img-fluid" />
        </div>

        <div class="col-md-6">
          <h2>Hello, my name is Aidan Brin</h2>
          <p id="about-text">Loading...</p>
        </div>

      </div>
    </div>
  </div>
</section>

<section id="case-studies" class="container mt-5">
  <h2>Case Studies</h2>
 
  <div class="row g-4">
 
    <div class="col-md-6">
      <div class="case-study-card">
        <a href="https://servicesiteabrin.netlify.app" class="case-study-img">
          <img src="Images/Design1.png" alt="Service site" />
        </a>
        <div class="case-study-text">
          <h4>Service Site</h4>
          <p>Aidan's Restaurant</p>
        </div>
      </div>
    </div>
 
    <div class="col-md-6">
      <div class="case-study-card">
        <a href="https://memorygameabrin.netlify.app" class="case-study-img">
          <img src="Images/Design2.jpg" alt="Memory game" />
        </a>
        <div class="case-study-text">
          <h4>Memory Game</h4>
          <p>Website for memory game.</p>
        </div>
      </div>
    </div>
 
    <div class="col-md-6">
      <div class="case-study-card">
        <a href="https://ecommerceabrin.netlify.app/" class="case-study-img">
          <img src="Images/Design3.png" alt="E-commerce site" />
        </a>
        <div class="case-study-text">
          <h4>E-commerce Site</h4>
          <p>Website for e-commerce.</p>
        </div>
      </div>
    </div>
 
    <div class="col-md-6">
      <div class="case-study-card">
        <a href="Design4/" class="case-study-img">
          <img src="Images/Design4.png" alt="Analytics site" />
        </a>
        <div class="case-study-text">
          <h4>Analytics Site</h4>
          <p>Website for analytics.</p>
        </div>
      </div>
    </div>
 
  </div>
</section>



  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="JS/script.js"></script>

</body>
</html>
